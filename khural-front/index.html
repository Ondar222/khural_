<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- SEO и метаданные -->
    <meta name="description" content="Официальный сайт Верховного Хурала (парламента) Республики Тыва" />
    <meta name="theme-color" content="#003366" />
    
    <!-- Оптимизация загрузки ресурсов -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://khural.rtyva.ru" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://khural.rtyva.ru" />
    
    <!-- Предзагрузка критических шрифтов -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Merriweather:wght@700;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Merriweather:wght@700;900&display=swap"
        rel="stylesheet"
      />
    </noscript>
    
    <title>Верховный Хурал РТ</title>
    
    <!-- API base URL -->
    <meta name="api-base" content="%VITE_API_BASE_URL%" />
    
    <!-- Иконка -->
    <link
      rel="icon"
      href="https://upload.wikimedia.org/wikipedia/commons/c/c3/Coat_of_arms_of_Tuva.svg"
    />
    
    <!-- Inline critical CSS для мгновенной отрисовки -->
    <style>
      /* Critical CSS для предотвращения layout shift */
      body{margin:0;font-family:Manrope,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
      #root{min-height:100vh;display:flex;flex-direction:column}
      .layout{display:flex;flex-direction:column;min-height:100vh}
      .main-content{flex:1}
      /* Спиннер загрузки */
      .loading-spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
      .loading-spinner__icon{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#003366;border-radius:50%;animation:spin 1s linear infinite}
      .loading-spinner__text{margin-top:16px;color:#1e3a8a;font-weight:700;font-size:16px}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    
    <!-- Скрипт для мгновенного показа спиннера -->
    <script>
      // Показываем спиннер до загрузки React
      (function() {
        // Проверяем, что document.body существует перед добавлением спиннера
        if (document.body) {
          const spinner = document.createElement('div');
          spinner.className = 'loading-spinner';
          spinner.innerHTML = '<div class="loading-spinner__icon"></div><div class="loading-spinner__text">Загрузка...</div>';
          document.body.appendChild(spinner);

          // Убираем спиннер после загрузки
          window.addEventListener('load', function() {
            setTimeout(function() {
              if (spinner.parentNode) spinner.parentNode.removeChild(spinner);
            }, 100);
          });
        }
      })();
    </script>
    
    <!-- Мониторинг stats.vk-portal.net: отключен для производительности -->
    <!-- Скрипт версии для слабовидящих -->
    <script src="https://lidrekon.ru/slep/js/jquery.js"></script>
    <script>
      // Загружаем плагин только если пользователь явно запросил версию для слабовидящих
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const shouldActivate = urlParams.get('special_version') === 'Y';
        if (shouldActivate) {
          const script = document.createElement('script');
          script.src = 'https://lidrekon.ru/slep/js/uhpv-full.min.js';
          script.async = true;
          document.head.appendChild(script);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Модуль загружается асинхронно (type="module" уже подразумевает defer) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
